spring.application.name=Overdose Watch API

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/overdosewatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:overdosewatch}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:overdosewatch}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.level.com.overdosewatch=INFO